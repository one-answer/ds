<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Bot Manager</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}">
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121931;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e6ebff;
      --muted: #a8b2d9;
      --primary: #5b8cff;
      --primary-hover: #4a7af3;
      --danger: #ff5c7a;
      --danger-hover: #ef4c69;
      --neutral: #25304d;
      --success-bg: rgba(29, 210, 136, 0.18);
      --success-text: #8ff5c5;
      --danger-bg: rgba(255, 92, 122, 0.2);
      --danger-text: #ffb4c2;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, #34498f 0%, transparent 38%),
        radial-gradient(circle at 92% 0%, #3e225d 0%, transparent 35%),
        linear-gradient(145deg, var(--bg) 0%, #0a0f1e 70%);
      min-height: 100vh;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.7vw, 1.8rem);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .global-mode-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .chip {
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      backdrop-filter: blur(8px);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 9px 13px;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-refresh,
    .btn-logs {
      background: var(--neutral);
      color: var(--text);
    }

    .btn-start {
      background: var(--primary);
      color: #fff;
    }

    .btn-start:hover {
      background: var(--primary-hover);
    }

    .btn-stop {
      background: var(--danger);
      color: #fff;
    }

    .btn-stop:hover {
      background: var(--danger-hover);
    }

    .toast {
      margin-bottom: 14px;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(31, 126, 255, 0.18);
      color: #d7e7ff;
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      border-radius: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .status-running {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: rgba(143, 245, 197, 0.36);
    }

    .status-stopped {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: rgba(255, 180, 194, 0.35);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-box {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.18);
      padding: 8px;
      min-height: 56px;
    }

    .meta-k {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 3px;
    }

    .meta-v {
      color: var(--text);
      font-size: 0.84rem;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .mode-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .mode-select {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.82rem;
    }

    .log-view {
      margin-top: 2px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(2, 6, 22, 0.78);
      color: #c9d6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.74rem;
      line-height: 1.45;
      min-height: 132px;
      max-height: 280px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .bt-result {
      margin-top: 12px;
      display: grid;
      gap: 12px;
    }

    .bt-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.2);
      box-shadow: var(--shadow);
    }

    .bt-summary-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bt-summary-title {
      font-weight: 800;
      font-size: 0.98rem;
    }

    .bt-summary-sub {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .bt-kpis {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .bt-kpi {
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
    }

    .bt-kpi-label {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 4px;
    }

    .bt-kpi-value {
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .bt-kpi-value.positive {
      color: var(--success-text);
    }

    .bt-kpi-value.negative {
      color: var(--danger-text);
    }

    .bt-meta {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .bt-meta-item {
      border-radius: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.18);
    }

    .bt-meta-label {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 4px;
    }

    .bt-meta-value {
      font-size: 0.82rem;
      color: var(--text);
      word-break: break-word;
    }

    .bt-table-wrap {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }

    .bt-table-title {
      padding: 10px 12px;
      font-weight: 800;
      font-size: 0.82rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
    }

    .bt-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.76rem;
    }

    .bt-table th,
    .bt-table td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bt-table th {
      color: var(--muted);
      font-weight: 700;
      background: rgba(255, 255, 255, 0.03);
    }

    .bt-table tr:last-child td {
      border-bottom: none;
    }

    .bt-empty {
      padding: 12px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .bt-params {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.16);
    }

    .bt-param-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bt-param-label {
      color: var(--muted);
      font-size: 0.72rem;
    }

    .bt-param-help {
      color: var(--muted);
      font-size: 0.7rem;
      line-height: 1.3;
    }

    .bt-param-input {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.82rem;
    }

    .bt-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      grid-column: 1 / -1;
    }

    .bt-presets-label {
      color: var(--muted);
      font-size: 0.72rem;
      margin-right: 4px;
    }

    .bt-preset-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.74rem;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    .bt-preset-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    .skeleton {
      border-radius: 10px;
      background: linear-gradient(100deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.18) 36%, rgba(255, 255, 255, 0.06) 65%);
      background-size: 220% 100%;
      animation: shimmer 1.5s infinite linear;
      min-height: 180px;
    }

    .sync-panel {
      margin-bottom: 14px;
      border-radius: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .sync-title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 800;
    }

    .sync-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      margin-bottom: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .field input,
    .field select {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.82rem;
    }

    .sync-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .sync-result {
      margin: 0;
      color: #c9d6ff;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .hint strong {
      color: var(--text);
      font-weight: 800;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin-bottom: 14px;
      align-items: center;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 12px;
    }

    .filter-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    .filter-btn[aria-pressed="true"] {
      background: rgba(91, 140, 255, 0.22);
      border-color: rgba(91, 140, 255, 0.35);
    }

    .filter-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    .simple-panel {
      border-radius: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin-bottom: 12px;
    }

    .simple-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .simple-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .advanced-wrap {
      margin-top: 10px;
    }

    .advanced-toggle {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .inline-params {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 6px 0 10px;
    }

    .inline-params label {
      color: var(--muted);
      font-size: 0.72rem;
      margin-right: 4px;
    }

    .inline-params input {
      width: 110px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.78rem;
    }

    .tab-btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.12s ease, border-color 0.2s ease;
      user-select: none;
    }

    .tab-btn:hover {
      transform: translateY(-1px);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .tab-btn[aria-selected="true"] {
      background: rgba(91, 140, 255, 0.22);
      border-color: rgba(91, 140, 255, 0.35);
      color: var(--text);
    }

    .tab-panel[hidden] {
      display: none !important;
    }

    .tab-panel {
      animation: tabIn 220ms ease both;
      transform-origin: top;
    }

    @keyframes tabIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -30% 0; }
    }

    @media (max-width: 740px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        width: 100%;
        flex-wrap: wrap;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="topbar">
    <div class="title-wrap">
      <h1 data-i18n="app_title">Crypto Bot Manager</h1>
      <div class="subtitle" data-i18n="app_subtitle">Control bot runtime and inspect logs in one place</div>
    </div>
    <div class="toolbar">
      <div class="chip" id="last-sync" data-i18n="last_sync_chip">Last sync: --</div>
      <div class="global-mode-wrap">
        <span data-i18n="global_start_mode">Global start mode:</span>
        <select class="mode-select" id="global-mode">
          <option value="live">Live</option>
          <option value="paper">Simulated</option>
        </select>
      </div>
      <div class="global-mode-wrap">
        <span data-i18n="language">Language:</span>
        <select class="mode-select" id="lang">
          <option value="en">EN</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <button class="btn btn-refresh" id="refresh" data-i18n="refresh">Refresh</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <nav class="tabs" role="tablist" aria-label="Sections">
    <button class="tab-btn" id="tab-kline" role="tab" aria-selected="true" aria-controls="panel-kline" type="button" data-tab="kline" data-i18n="tab_kline">Sync K-Line</button>
    <button class="tab-btn" id="tab-trading" role="tab" aria-selected="false" aria-controls="panel-trading" type="button" data-tab="trading" data-i18n="tab_trading">Trading Scripts</button>
  </nav>

  <section class="tab-panel" id="panel-kline" role="tabpanel" aria-labelledby="tab-kline">
    <section class="sync-panel">
    <h2 class="sync-title" data-i18n="kline_sync_title">K-Line Sync</h2>
    <div class="sync-grid">
      <div class="field">
        <label for="kline-symbol" data-i18n="symbol">Symbol</label>
        <select id="kline-symbol">
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="field">
        <label for="kline-sync-type" data-i18n="sync_type">Sync Type</label>
        <select id="kline-sync-type">
          <option value="day" id="kline-sync-type-day">Single Day</option>
          <option value="range" id="kline-sync-type-range">Date Range</option>
        </select>
      </div>
      <div class="field">
        <label for="kline-timeframe" data-i18n="timeframe">Timeframe</label>
        <select id="kline-timeframe"></select>
      </div>
      <div class="field" id="kline-day-wrap">
        <label for="kline-day" data-i18n="date">Date</label>
        <input id="kline-day" type="date">
      </div>
      <div class="field" id="kline-start-wrap" style="display:none;">
        <label for="kline-start" data-i18n="start_date">Start Date</label>
        <input id="kline-start" type="date">
      </div>
      <div class="field" id="kline-end-wrap" style="display:none;">
        <label for="kline-end" data-i18n="end_date">End Date</label>
        <input id="kline-end" type="date">
      </div>
      <div class="field">
        <label for="kline-tz" data-i18n="timezone">Timezone</label>
        <input id="kline-tz" type="text" value="Asia/Shanghai" placeholder="Asia/Shanghai">
      </div>
    </div>
    <div class="sync-actions">
      <button class="btn btn-start" id="kline-sync-btn" data-i18n="kline_sync_btn">Sync K-Line</button>
      <p class="sync-result" id="kline-result">Ready.</p>
    </div>
    </section>

    <section class="sync-panel">
      <h2 class="sync-title" data-i18n="backtest_title">Backtest</h2>
      <div class="sync-grid">
        <div class="field">
          <label for="bt-symbol" data-i18n="symbol">Symbol</label>
          <select id="bt-symbol">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="field">
          <label for="bt-timeframe" data-i18n="timeframe">Timeframe</label>
          <select id="bt-timeframe">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="field">
          <label for="bt-start" data-i18n="start_date">Start Date</label>
          <input id="bt-start" type="date">
        </div>
        <div class="field">
          <label for="bt-end" data-i18n="end_date">End Date</label>
          <input id="bt-end" type="date">
        </div>
        <div class="field">
          <label for="bt-tz" data-i18n="timezone">Timezone</label>
          <input id="bt-tz" type="text" value="Asia/Shanghai" placeholder="Asia/Shanghai">
        </div>
        <div class="field">
          <label for="bt-strategy" data-i18n="strategy">Strategy</label>
          <select id="bt-strategy">
            <option value="">Loading...</option>
          </select>
          <p class="hint" id="bt-strategy-desc"></p>
        </div>
        <div class="field">
          <label for="bt-initial-capital" data-i18n="initial_capital">Initial capital (USDT)</label>
          <input id="bt-initial-capital" type="number" min="1" step="1" value="1000">
        </div>
        <div class="field">
          <label for="bt-leverage" data-i18n="leverage">Leverage</label>
          <input id="bt-leverage" type="number" min="0.1" step="0.1" value="1">
        </div>
        <div class="field">
          <label for="bt-fee-bps" data-i18n="fee_bps_side">Fee (bps/side)</label>
          <input id="bt-fee-bps" type="number" min="0" step="0.1" value="5">
        </div>
        <div class="field">
          <label for="bt-slippage-bps" data-i18n="slippage_bps_side">Slippage (bps/side)</label>
          <input id="bt-slippage-bps" type="number" min="0" step="0.1" value="2">
        </div>

  function normalizeLang(value) {
    return value === "zh" ? "zh" : "en";
  }

  const LANG_KEY = "ds-lang";

  function getLang() {
    try {
      const stored = localStorage.getItem(LANG_KEY);
      if (stored) return normalizeLang(stored);
    } catch (err) {
      // ignore storage errors
    }
    const nav = (navigator.language || "").toLowerCase();
    if (nav.startsWith("zh")) return "zh";
    return "en";
  }

  function setLang(lang) {
    const normalized = normalizeLang(lang);
    try {
      localStorage.setItem(LANG_KEY, normalized);
    } catch (err) {
      // ignore storage errors
    }
    return normalized;
  }

  function t(key, vars = null) {
    const lang = getLang();
    const dict = I18N[lang] || I18N.en;
    const fallback = I18N.en || {};
    let text = dict[key] || fallback[key] || String(key);
    if (vars && typeof vars === "object") {
      Object.keys(vars).forEach((k) => {
        text = text.replaceAll(`{${k}}`, String(vars[k]));
      });
    }
    return text;
  }

    try {

    } catch (err) {

    try {
      localStorage.setItem(GLOBAL_MODE_KEY, normalized);
    } catch (err) {

    return normalized;

  function applyGlobalModeToCards(mode) {
    const normalized = normalizeMode(mode);
    cards.querySelectorAll(".card").forEach((card) => {
      const startBtn = card.querySelector("[data-action='start']");
      const modeSelect = card.querySelector("[data-role='mode']");
      if (!startBtn || !modeSelect || startBtn.disabled) return;
      modeSelect.value = normalized;

    return value === "trading" ? "trading" : "kline";
  }

    const isKline = normalized === "kline";

    tabKline.setAttribute("aria-selected", isKline ? "true" : "false");
    tabTrading.setAttribute("aria-selected", isKline ? "false" : "true");
    panelKline.hidden = !isKline;
    panelTrading.hidden = isKline;

    try {
      localStorage.setItem(ACTIVE_TAB_KEY, normalized);
    } catch (err) {
      // ignore storage errors
    }

    const v = String(value || "").toLowerCase();
    if (v === "ai" || v === "backtest" || v === "custom") return v;
    return "all";
  }

    currentStrategyFilter = normalizeFilter(value);

      strategyFilters.querySelectorAll("[data-filter]").forEach((btn) => {

        btn.setAttribute("aria-pressed", isActive ? "true" : "false");

  function applyI18n() {
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const key = el.getAttribute("data-i18n");
      if (!key) return;
      el.textContent = t(key);
    });

    // Keep select option labels in sync with language (without changing values).
    const gmLive = globalModeSelect.querySelector("option[value='live']");
    const gmPaper = globalModeSelect.querySelector("option[value='paper']");
    if (gmLive) gmLive.textContent = t("mode_label_live");
    if (gmPaper) gmPaper.textContent = t("mode_label_paper");

    // Update "Loading..." placeholders for selects before options are fetched.
    [klineSymbol, btSymbol, btTimeframe, btStrategy].forEach((sel) => {
      if (!sel) return;
      if (sel.options && sel.options.length === 1 && sel.options[0].value === "") {
        const text = String(sel.options[0].textContent || "").trim();
        if (text === "Loading..." || text === "加载中...") {
          sel.options[0].textContent = t("loading");
        }
      }
    });

    const isDefaultResult = (el) => {
      const v = String(el.textContent || "").trim();
      return v === I18N.en.ready || v === I18N.zh.ready || v === "Ready." || v === "就绪。";
    };
    if (isDefaultResult(klineResult)) klineResult.textContent = t("ready");
    if (isDefaultResult(btResult)) btResult.textContent = t("ready");

    // Re-label strategy select options (keep value, preserve selection)
    const selected = btStrategy.value;
    Array.from(btStrategy.options || []).forEach((opt) => {
      const id = opt.value;
      if (!id) return;
      const meta = backtestStrategyMeta[id] || {};
      opt.textContent = getLang() === "zh" && meta.name_zh ? String(meta.name_zh) : String(meta.name || id);
    });
    if (selected) btStrategy.value = selected;
    updateBacktestStrategyDescription();

    updateSyncTypeLabels();
    document.title = t("app_title");
    render(true);
  }

  function showToast(message) {
    toast.textContent = message;
    toast.style.display = "block";
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => {
      toast.style.display = "none";
    }, 2400);
  }

  function setLoading() {
    cards.innerHTML = "<div class='skeleton'></div><div class='skeleton'></div>";
  }

  function setDefaultDates() {
    const today = new Date();
    const formatDate = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };
    const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);
    if (!klineDay.value) klineDay.value = formatDate(yesterday);
    if (!klineStart.value) klineStart.value = formatDate(yesterday);
    if (!klineEnd.value) klineEnd.value = formatDate(today);
  }

  function fillSelectOptions(selectElement, options, keepCurrent = true) {
    const values = Array.isArray(options) ? options.filter(Boolean) : [];
    const current = keepCurrent ? selectElement.value : "";

    if (!values.length) {
      selectElement.innerHTML = "<option value=''>--</option>";
      return;
    }

    selectElement.innerHTML = values
      .map((value) => `<option value="${value}">${value}</option>`)
      .join("");

    if (keepCurrent && values.includes(current)) {
      selectElement.value = current;
    }
  }

  function syncTypeLabel(prefix, timeframes) {
    const items = Array.isArray(timeframes) ? timeframes.filter(Boolean) : [];
    if (!items.length) return prefix;
    return `${prefix} (${items.join(" / ")})`;
  }

  function updateSyncTypeLabels() {
    klineSyncTypeDay.textContent = syncTypeLabel(t("single_day"), klineTimeframeOptions.day);
    klineSyncTypeRange.textContent = syncTypeLabel(t("date_range"), klineTimeframeOptions.range);
  }

  async function loadKlineOptions() {
    try {
      const response = await fetch("/api/kline/options");
      if (!response.ok) throw new Error(t("kline_options_failed"));
      const body = await response.json();

      fillSelectOptions(klineSymbol, body.symbols || defaultKlineConfig.symbols, true);
      klineTimeframeOptions = {
        day: body.day_timeframes || defaultKlineConfig.day_timeframes,
        range: body.range_timeframes || defaultKlineConfig.range_timeframes,
      };
      if (!klineTz.value.trim()) {
        klineTz.value = body.default_tz || defaultKlineConfig.default_tz;
      }
      updateSyncTypeLabels();
      return;
    } catch (err) {
      fillSelectOptions(klineSymbol, defaultKlineConfig.symbols, true);
      klineTimeframeOptions = {
        day: defaultKlineConfig.day_timeframes,
        range: defaultKlineConfig.range_timeframes,
      };
      updateSyncTypeLabels();
      showToast(err.message || t("kline_options_failed"));
    }
  }

  function updateKlineForm() {
    const type = klineSyncType.value === "range" ? "range" : "day";
    const options = klineTimeframeOptions[type] || [];
    const current = klineTimeframe.value;

    klineTimeframe.innerHTML = options
      .map((value) => `<option value="${value}">${value}</option>`)
      .join("");

    if (options.includes(current)) {
      klineTimeframe.value = current;
    } else if (options.length) {
      klineTimeframe.value = options[0];
    }

    const isRange = type === "range";
    klineDayWrap.style.display = isRange ? "none" : "flex";
    klineStartWrap.style.display = isRange ? "flex" : "none";
    klineEndWrap.style.display = isRange ? "flex" : "none";
  }

  function showKlineResult(text) {
    klineResult.textContent = text;
  }

  function showBacktestResult(text, details = null) {
    btResult.textContent = text;
    if (!details || typeof details !== "object") {
      btDetails.style.display = "none";
      btDetails.innerHTML = "";
      return;
    }
    btDetails.style.display = "grid";
    btDetails.innerHTML = renderBacktestDetails(details);
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatPct(value, digits = 2) {
    return `${Number(value ?? 0).toFixed(digits)}%`;
  }

  function formatNum(value, digits = 2) {
    return Number(value ?? 0).toFixed(digits);
  }

  function formatTs(tsMs, tzName) {
    const ms = Number(tsMs || 0);
    if (!ms) return "--";
    try {
      return new Intl.DateTimeFormat(undefined, {
        timeZone: tzName || "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      }).format(new Date(ms));
    } catch (err) {
      return new Date(ms).toLocaleString();
    }
  }

  function toneForValue(value) {
    const n = Number(value ?? 0);
    if (Number.isNaN(n)) return "";
    if (n > 0) return "positive";
    if (n < 0) return "negative";
    return "";
  }

  function renderBacktestDetails(payload) {
    const r = payload.result || {};
    const strategyObj = r.strategy || {};
    const strategyName = (btStrategy && btStrategy.selectedOptions && btStrategy.selectedOptions[0])
      ? btStrategy.selectedOptions[0].textContent
      : (strategyObj.name || strategyObj.id || "");

    const headline = t("backtest_finished");
    const summarySub = `${escapeHtml(r.symbol || "")} · ${escapeHtml(r.timeframe || "")} · ${escapeHtml(r.tz || "")} · ${escapeHtml(r.start_date || "")} → ${escapeHtml(r.end_date || "")}`;

    const kpis = [
      { label: t("bt_total"), value: formatPct(r.total_return_pct), tone: toneForValue(r.total_return_pct) },
      { label: t("bt_pnl"), value: formatNum(r.pnl_capital), tone: toneForValue(r.pnl_capital) },
      { label: t("bt_equity_end"), value: formatNum(r.equity_end_capital) },
      { label: t("bt_dd"), value: formatPct(r.max_drawdown_pct), tone: "negative" },
      { label: t("bt_win"), value: formatPct(r.win_rate_pct, 1) },
      { label: t("bt_bh"), value: formatPct(r.buy_hold_return_pct), tone: toneForValue(r.buy_hold_return_pct) },
      { label: t("bt_profit_factor"), value: r.profit_factor != null ? formatNum(r.profit_factor, 3) : "--" },
      { label: t("bt_sharpe_like"), value: r.sharpe_like != null ? formatNum(r.sharpe_like, 3) : "--" },
      { label: t("bt_candles"), value: r.candles ?? "--" },
      { label: t("bt_trades"), value: r.trades ?? "--" },
    ];

    const metaItems = [
      { label: t("strategy"), value: `${strategyName} ${strategyObj.id ? `(${strategyObj.id})` : ""}`.trim() },
      { label: t("leverage"), value: r.leverage ?? "--" },
      { label: t("fee_bps_side"), value: r.fee_bps ?? "--" },
      { label: t("slippage_bps_side"), value: r.slippage_bps ?? "--" },
      { label: t("symbol"), value: r.symbol ?? "--" },
      { label: t("timeframe"), value: r.timeframe ?? "--" },
      { label: t("timezone"), value: r.tz ?? "--" },
      { label: t("date_range"), value: `${r.start_date || "--"} → ${r.end_date || "--"}` },
      { label: t("initial_capital"), value: formatNum(r.initial_capital) },
      { label: t("bt_equity_end"), value: formatNum(r.equity_end_capital) },
      { label: t("bt_pnl"), value: formatNum(r.pnl_capital) },
    ];

    const preview = Array.isArray(r.trades_preview) ? r.trades_preview : [];
    const tradesHtml = preview.length
      ? `<table class="bt-table">
          <thead>
            <tr>
              <th>${escapeHtml(t("bt_side"))}</th>
              <th>${escapeHtml(t("bt_entry_time"))}</th>
              <th>${escapeHtml(t("bt_entry"))}</th>
              <th>${escapeHtml(t("bt_exit_time"))}</th>
              <th>${escapeHtml(t("bt_exit"))}</th>
              <th>${escapeHtml(t("bt_ret"))}</th>
            </tr>
          </thead>
          <tbody>
            ${preview.map((trade) => {
              const sideLabel = trade.side === "SHORT" ? t("side_short") : t("side_long");
              const ret = formatPct(trade.return_pct, 2);
              const tone = toneForValue(trade.return_pct);
              const entryTime = formatTs(trade.entry_ts_ms, r.tz);
              const exitTime = formatTs(trade.exit_ts_ms, r.tz);
              return `<tr>
                <td>${escapeHtml(sideLabel)}</td>
                <td>${escapeHtml(entryTime)}</td>
                <td>${escapeHtml(trade.entry_price)}</td>
                <td>${escapeHtml(exitTime)}</td>
                <td>${escapeHtml(trade.exit_price)}</td>
                <td class="${tone ? `bt-kpi-value ${tone}` : ""}">${escapeHtml(ret)}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>`
      : `<div class="bt-empty">${escapeHtml(t("bt_trades_preview"))}: ${escapeHtml(t("bt_empty"))}</div>`;

    return `
      <div class="bt-summary">
        <div class="bt-summary-main">
          <div class="bt-summary-title">${escapeHtml(headline)}</div>
          <div class="bt-summary-sub">${summarySub}</div>
        </div>
      </div>
      <div class="bt-kpis">
        ${kpis.map((k) => `
          <div class="bt-kpi">
            <div class="bt-kpi-label">${escapeHtml(k.label)}</div>
            <div class="bt-kpi-value ${k.tone || ""}">${escapeHtml(k.value)}</div>
          </div>
        `).join("")}
      </div>
      <div class="bt-meta">
        ${metaItems.map((m) => `
          <div class="bt-meta-item">
            <div class="bt-meta-label">${escapeHtml(m.label)}</div>
            <div class="bt-meta-value">${escapeHtml(m.value)}</div>
          </div>
        `).join("")}
      </div>
      <div class="bt-table-wrap">
        <div class="bt-table-title">${escapeHtml(t("bt_trades_preview"))}</div>
        ${tradesHtml}
      </div>
    `;
  }

  function safeParseJsonOrEmpty(text) {
    const trimmed = String(text || "").trim();
    if (!trimmed) return {};
    try {
      const parsed = JSON.parse(trimmed);
      return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
    } catch (err) {
      return null;
    }
  }

  let backtestStrategyMeta = {};

  function updateBacktestStrategyDescription() {
    const sid = btStrategy.value;
    const meta = backtestStrategyMeta[sid] || {};
    const lang = getLang();
    const desc = lang === "zh" ? (meta.description_zh || meta.description || "") : (meta.description || "");
    if (!desc) {
      btStrategyDesc.textContent = "";
      return;
    }
    btStrategyDesc.textContent = `${t("strategy_desc")}: ${desc}`;
  }

  function applyBacktestDefaults(body) {
    const defaults = (body && body.defaults) || {};
    if (btTz && !btTz.value.trim()) btTz.value = body.default_tz || "Asia/Shanghai";
    if (btInitialCapital && !btInitialCapital.value) btInitialCapital.value = String(defaults.initial_capital ?? 1000.0);
    if (btLeverage && !btLeverage.value) btLeverage.value = String(defaults.leverage ?? 1.0);
    if (btFeeBps && !btFeeBps.value) btFeeBps.value = String(defaults.fee_bps ?? 5.0);
    if (btSlippageBps && !btSlippageBps.value) btSlippageBps.value = String(defaults.slippage_bps ?? 2.0);
  }

  function updateBacktestParamsPlaceholder() {
    const sid = btStrategy.value;
    const meta = backtestStrategyMeta[sid] || {};
    const defaults = meta.defaults || {};
    btParams.placeholder = JSON.stringify(defaults);
    if (!btParams.value.trim()) {
      btParams.value = JSON.stringify(defaults);
    }
    updateBacktestStrategyDescription();
    renderBacktestParamsForm(meta);
  }

  btParamsUi?.addEventListener("input", (event) => {
    const target = event.target;
    if (target && target.matches("[data-param-key]")) {
      syncParamsJsonFromUi();
    }
  });

  function renderBacktestParamsForm(meta) {
    if (!btParamsUi) return;
    const defaults = meta?.defaults || {};
    const entries = Object.entries(defaults || {});
    if (!entries.length) {
      btParamsUi.innerHTML = `<div class="bt-empty">${escapeHtml(t("bt_params_empty"))}</div>`;
      btParams.value = "{}";
      return;
    }
    const lang = getLang();
    const labelMap = lang === "zh" ? (meta?.param_labels_zh || {}) : (meta?.param_labels || {});
    const helpMap = lang === "zh" ? (meta?.param_help_zh || {}) : (meta?.param_help || {});
    const rangeMap = meta?.param_range || {};
    const presets = lang === "zh" ? (meta?.param_presets_zh || {}) : (meta?.param_presets || {});
    const presetEntries = Object.entries(presets || {});

    let presetsHtml = "";
    if (presetEntries.length) {
      presetsHtml = `
        <div class="bt-presets">
          <span class="bt-presets-label">${escapeHtml(t("bt_params_presets"))}:</span>
          ${presetEntries.map(([key, preset]) => {
            const label = (preset && preset.name) ? preset.name : key;
            const params = preset && preset.params ? preset.params : preset;
            return `<button type="button" class="bt-preset-btn" data-preset='${escapeHtml(JSON.stringify(params))}'>${escapeHtml(label)}</button>`;
          }).join("")}
        </div>
      `;
    }
    const fieldsHtml = entries.map(([key, value]) => {
      const type = typeof value;
      const inputType = type === "number" ? "number" : "text";
      const step = inputType === "number" ? "0.1" : "";
      const val = value === null || value === undefined ? "" : value;
      const label = labelMap[key] || key;
      const help = helpMap[key] || "";
      const range = Array.isArray(rangeMap[key]) ? rangeMap[key] : null;
      const rangeText = range ? `${t("bt_params_range")}: ${range[0]} - ${range[1]}` : "";
      return `
        <div class="bt-param-field">
          <label class="bt-param-label">${escapeHtml(label)}</label>
          <input class="bt-param-input" data-param-key="${escapeHtml(key)}" type="${inputType}" value="${escapeHtml(val)}" step="${step}">
          ${help ? `<div class="bt-param-help">${escapeHtml(help)}</div>` : ""}
          ${rangeText ? `<div class="bt-param-help">${escapeHtml(rangeText)}</div>` : ""}
        </div>
      `;
    }).join("");
    btParamsUi.innerHTML = `${presetsHtml}${fieldsHtml}`;
    syncParamsJsonFromUi();
  }

  btParamsUi?.addEventListener("click", (event) => {
    const target = event.target;
    if (!target || !target.classList.contains("bt-preset-btn")) return;
    const presetText = target.getAttribute("data-preset") || "{}";
    let preset = {};
    try {
      preset = JSON.parse(presetText);
    } catch (err) {
      preset = {};
    }
    Object.entries(preset).forEach(([key, value]) => {
      const input = btParamsUi.querySelector(`[data-param-key="${key}"]`);
      if (!input) return;
      input.value = value;
    });
    syncParamsJsonFromUi();
  });

  function syncParamsJsonFromUi() {
    if (!btParamsUi) return;
    const inputs = btParamsUi.querySelectorAll("[data-param-key]");
    const params = {};
    inputs.forEach((input) => {
      const key = input.getAttribute("data-param-key");
      if (!key) return;
      if (input.type === "number") {
        const num = Number(input.value);
        params[key] = Number.isNaN(num) ? 0 : num;
      } else {
        params[key] = input.value;
      }
    });
    btParams.value = JSON.stringify(params);
  }

  async function loadBacktestOptions() {
    try {
      const response = await fetch("/api/backtest/options");
      if (!response.ok) throw new Error(t("backtest_options_failed"));
      const body = await response.json();

      fillSelectOptions(btSymbol, body.symbols || defaultKlineConfig.symbols, true);
      fillSelectOptions(btTimeframe, body.timeframes || defaultKlineConfig.range_timeframes, true);

      const strategies = Array.isArray(body.strategies) ? body.strategies : [];
      backtestStrategyMeta = {};
      btStrategy.innerHTML = strategies
        .map((s) => {
          const id = String(s.id || "");
          backtestStrategyMeta[id] = s;
          const name = getLang() === "zh" && s.name_zh ? String(s.name_zh) : String(s.name || id);
          return `<option value="${id}">${name}</option>`;
        })
        .join("");

      applyBacktestDefaults(body);
      updateBacktestParamsPlaceholder();
      updateBacktestStrategyDescription();

      setupQuickStart(body);

      // Default date range: yesterday -> today
      const today = new Date();
      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      };
      const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);
      if (!btStart.value) btStart.value = formatDate(yesterday);
      if (!btEnd.value) btEnd.value = formatDate(today);
      return;
    } catch (err) {
      showToast(err.message || t("backtest_options_failed"));
    }
  }

  async function runBacktest() {
    const params = safeParseJsonOrEmpty(btParams.value);
    if (params === null) {
      showBacktestResult(t("params_json_invalid"));
      return;
    }

    const payload = {
      symbol: btSymbol.value,
      timeframe: btTimeframe.value,
      start_date: btStart.value,
      end_date: btEnd.value,
      tz: btTz.value.trim() || "Asia/Shanghai",
      strategy_id: btStrategy.value,
      params,
      initial_capital: Number(btInitialCapital.value || 1000),
      leverage: Number(btLeverage.value || 1),
      fee_bps: Number(btFeeBps.value || 0),
      slippage_bps: Number(btSlippageBps.value || 0),
    };

    if (!payload.start_date || !payload.end_date) {
      showBacktestResult(t("select_bt_dates"));
      return;
    }

    btRunBtn.disabled = true;
    showBacktestResult(t("backtest_running"));
    try {
      const response = await fetch("/api/backtest/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      const body = await response.json();
      if (!response.ok) throw new Error(body.error || t("backtest_failed"));

      const r = body.result || {};
      const headlineParts = [];
      headlineParts.push(t("bt_done"));
      headlineParts.push(`${t("bt_candles")}=${r.candles}`);
      headlineParts.push(`${t("bt_trades")}=${r.trades}`);
      headlineParts.push(`${t("bt_total")}=${(r.total_return_pct ?? 0).toFixed(2)}%`);
      headlineParts.push(`${t("bt_equity_end")}=${Number(r.equity_end_capital ?? 0).toFixed(2)}`);
      headlineParts.push(`${t("bt_pnl")}=${Number(r.pnl_capital ?? 0).toFixed(2)}`);
      headlineParts.push(`${t("bt_dd")}=${(r.max_drawdown_pct ?? 0).toFixed(2)}%`);
      headlineParts.push(`${t("bt_win")}=${(r.win_rate_pct ?? 0).toFixed(1)}%`);
      headlineParts.push(`${t("bt_bh")}=${(r.buy_hold_return_pct ?? 0).toFixed(2)}%`);
      const headline = headlineParts.join(" | ");

      const lines = [];
      const strategyObj = r.strategy || {};
      lines.push(
        t("bt_strategy_line", {
          id: strategyObj.id || "",
          leverage: r.leverage,
          fee_bps: r.fee_bps,
          slippage_bps: r.slippage_bps,
        })
      );
      lines.push(
        t("bt_symbol_line", {
          symbol: r.symbol,
          timeframe: r.timeframe,
          tz: r.tz,
        })
      );
      lines.push(
        t("bt_range_line", {
          start: r.start_date,
          end: r.end_date,
        })
      );
      lines.push(
        t("bt_capital_line", {
          initial: Number(r.initial_capital ?? 0).toFixed(2),
          end: Number(r.equity_end_capital ?? 0).toFixed(2),
          pnl: Number(r.pnl_capital ?? 0).toFixed(2),
        })
      );
      if (r.profit_factor != null) lines.push(`${t("bt_profit_factor")}=${Number(r.profit_factor).toFixed(3)}`);
      if (r.sharpe_like != null) lines.push(`${t("bt_sharpe_like")}=${Number(r.sharpe_like).toFixed(3)}`);
      lines.push("");
      const preview = Array.isArray(r.trades_preview) ? r.trades_preview : [];
      if (preview.length) {
        lines.push(`${t("bt_trades_preview")}:`);
        preview.forEach((trade) => {
          const sideLabel = trade.side === "SHORT" ? t("side_short") : t("side_long");
          lines.push(
            `${sideLabel} ${t("bt_entry")}=${trade.entry_price} ${t("bt_exit")}=${trade.exit_price} ${t("bt_ret")}=${(trade.return_pct ?? 0).toFixed(2)}%`
          );
        });
      } else {
        lines.push(`${t("bt_trades_preview")}: ${t("bt_empty")}`);
      }

      showBacktestResult(headline, { result: r });
      showToast(t("backtest_finished"));
    } catch (err) {
      showBacktestResult(err.message || t("backtest_failed"));
      showToast(err.message || t("backtest_failed"));
    } finally {
      btRunBtn.disabled = false;
    }
  }

  async function syncKline() {
    const syncType = klineSyncType.value === "range" ? "range" : "day";
    const payload = {
      symbol: klineSymbol.value,
      sync_type: syncType,
      timeframe: klineTimeframe.value,
      tz: klineTz.value.trim() || "Asia/Shanghai",
    };

    if (syncType === "day") {
      if (!klineDay.value) throw new Error(t("select_single_day_date"));
      payload.date = klineDay.value;
    } else {
      if (!klineStart.value || !klineEnd.value) throw new Error(t("select_range_dates"));
      payload.start_date = klineStart.value;
      payload.end_date = klineEnd.value;
    }

    klineSyncBtn.disabled = true;
    showKlineResult(t("syncing"));

    try {
      const response = await fetch("/api/kline/sync", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });

      const body = await response.json();
      if (!response.ok) {
        throw new Error(body.error || t("kline_sync_failed"));
      }

      const result = body.result || {};
      showKlineResult(
        `Done | symbol=${result.symbol} timeframe=${result.timeframe} fetched=${result.fetched} affected=${result.affected}`
      );
      showToast(t("kline_sync_finished"));
    } finally {
      klineSyncBtn.disabled = false;
    }
  }

  async function fetchStrategies() {
    const response = await fetch("/api/strategies");
    if (!response.ok) throw new Error(t("load_strategies_failed"));
    return response.json();
  }

  let lastOpenedLogs = {};

  function updateCards(list) {
    const existingCards = cards.querySelectorAll(".card");
    if (!existingCards.length) return false;
    const byName = new Map(list.map((item) => [item.name, item]));
    let updated = false;
    existingCards.forEach((card) => {
      const name = card.dataset.name;
      const item = byName.get(name);
      if (!item) return;
      updated = true;
      const statusEl = card.querySelector("[data-role='status']");
      const pidEl = card.querySelector("[data-role='pid']");
      const startedEl = card.querySelector("[data-role='started']");
      const logEl = card.querySelector("[data-role='log']");
      const modeLabelEl = card.querySelector("[data-role='trade-mode']");
      const modeSelect = card.querySelector("[data-role='mode']");
      const startBtn = card.querySelector("[data-action='start']");
      const stopBtn = card.querySelector("[data-action='stop']");

      const running = !!item.running;
      const statusText = running ? t("running") : t("stopped");
      const statusClass = running ? "status-running" : "status-stopped";
      if (statusEl) {
        statusEl.textContent = statusText;
        statusEl.classList.remove("status-running", "status-stopped");
        statusEl.classList.add(statusClass);
      }
      if (pidEl) pidEl.textContent = item.pid || "-";
      if (startedEl) startedEl.textContent = item.started_at ? new Date(item.started_at).toLocaleString() : "-";
      if (logEl) logEl.textContent = item.log || "-";
      if (modeLabelEl) {
        const mode = item.mode === "paper" ? "paper" : "live";
        modeLabelEl.textContent = mode === "paper" ? t("mode_label_paper") : t("mode_label_live");
      }
      if (modeSelect) modeSelect.disabled = running;
      if (startBtn) startBtn.disabled = running;
      if (stopBtn) stopBtn.disabled = !running;
    });
    return updated;
  }

  async function render(showLoader = false) {
    if (showLoader) setLoading();
    try {
      const list = await fetchStrategies();
      const filtered = currentStrategyFilter === "all"
        ? list
        : list.filter((item) => (item.type || "custom") === currentStrategyFilter);
      const updated = !showLoader && updateCards(filtered);
      if (!updated) {
        cards.innerHTML = filtered.map(cardTemplate).join("");
      }
      lastSync.textContent = `${t("last_sync")}: ${new Date().toLocaleTimeString()}`;

      const names = Object.keys(lastOpenedLogs);
      if (names.length) {
        await Promise.all(names.map(async (name) => {
          const target = document.getElementById(`log-${name}`);
          if (!target) return;
          try {
            const response = await fetch(`/api/strategies/${name}/logs?lines=150`);
            const body = await response.json();
            target.textContent = body.content || t("no_logs_yet");
            target.scrollTop = target.scrollHeight;
          } catch (err) {
            // ignore refresh errors
          }
        }));
      }
    } catch (err) {
      showToast(err.message || t("load_failed"));
    }
  }

  async function control(name, action, mode = "live") {
    const fetchOptions = {method: "POST"};
    if (action === "start") {
      fetchOptions.headers = {"Content-Type": "application/json"};
      fetchOptions.body = JSON.stringify({mode});
    }
    const response = await fetch(`/api/strategies/${name}/${action}`, fetchOptions);
    const body = await response.json();
    showToast(body.message || `${action} completed`);
    await render();
    if (action === "start") {
      await loadLogs(name);
    }
  }

  async function saveStrategyConfig(name, amount, leverage) {
    const response = await fetch(`/api/strategies/${name}/config`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({amount, leverage}),
    });
    const body = await response.json();
    if (!response.ok) {
      throw new Error(body.error || t("save_failed"));
    }
    return body;
  }

  async function saveStrategyConfigPartial(name, payload) {
    const response = await fetch(`/api/strategies/${name}/config`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const body = await response.json();
    if (!response.ok) throw new Error(body.error || t("save_failed"));
    return body;
  }

  function setupQuickStart(optionsBody) {
    if (!quickSymbol || !quickTimeframe || !quickStrategy) return;
    const symbols = optionsBody?.symbols || defaultKlineConfig.symbols || [];
    const timeframes = optionsBody?.timeframes || defaultKlineConfig.range_timeframes || [];
    fillSelectOptions(quickSymbol, symbols, true);
    fillSelectOptions(quickTimeframe, timeframes, true);

    const aiOption = {id: "ai", name: "DeepSeek AI", name_zh: "DeepSeek AI", type: "ai"};
    const strategies = Array.isArray(optionsBody?.strategies) ? optionsBody.strategies : [];
    const list = [aiOption, ...strategies];
    quickStrategy.innerHTML = list.map((s) => {
      const name = getLang() === "zh" ? (s.name_zh || s.name || s.id) : (s.name || s.id);
      return `<option value="${s.id}" data-type="${s.type || "backtest"}">${name}</option>`;
    }).join("");
  }

  function symbolKey(symbol) {
    return String(symbol || "").replaceAll("/", "_").replaceAll(":", "_").toLowerCase();
  }

  async function quickStart() {
    const symbol = quickSymbol.value;
    const timeframe = quickTimeframe.value;
    const strategyId = quickStrategy.value;
    const mode = quickMode ? quickMode.value : "live";

    if (!symbol || !timeframe || !strategyId) return;

    if (strategyId === "ai") {
      const name = symbol.includes("DOGE") ? "doge" : symbol.includes("XRP") ? "xrp" : "";
      if (!name) throw new Error("AI strategy only supports DOGE/XRP currently");
      await control(name, "start", mode);
      quickResult.textContent = `${symbol} ${t("start")}`;
      return;
    }

    const name = `bt_${strategyId}_${symbolKey(symbol)}`;
    await saveStrategyConfigPartial(name, {timeframe});
    await control(name, "start", mode);
    quickResult.textContent = `${symbol} ${t("start")}`;
  }

  async function quickStop() {
    const symbol = quickSymbol.value;
    const strategyId = quickStrategy.value;
    if (!symbol || !strategyId) return;

    if (strategyId === "ai") {
      const name = symbol.includes("DOGE") ? "doge" : symbol.includes("XRP") ? "xrp" : "";
      if (!name) throw new Error("AI strategy only supports DOGE/XRP currently");
      await control(name, "stop");
      quickResult.textContent = `${symbol} ${t("stop")}`;
      return;
    }

    const name = `bt_${strategyId}_${symbolKey(symbol)}`;
    await control(name, "stop");
    quickResult.textContent = `${symbol} ${t("stop")}`;
  }

  async function loadLogs(name) {
    const response = await fetch(`/api/strategies/${name}/logs?lines=150`);
    const body = await response.json();
    const target = document.getElementById(`log-${name}`);
    target.textContent = body.content || t("no_logs_yet");
    target.scrollTop = target.scrollHeight;
    lastOpenedLogs[name] = true;
  }

  cards.addEventListener("click", async (event) => {
    const button = event.target.closest("button[data-action]");
    if (!button) return;

    const card = event.target.closest(".card");
    if (!card) return;

    const name = card.dataset.name;
    const action = button.dataset.action;
    const modeSelect = card.querySelector("[data-role='mode']");
    const selectedMode = modeSelect ? modeSelect.value : "live";

    try {
      if (action === "start" || action === "stop") {
        await control(name, action, selectedMode);
      } else if (action === "logs") {
        await loadLogs(name);
      } else if (action === "save-config") {
        const amountInput = card.querySelector("[data-role='amount']");
        const leverageInput = card.querySelector("[data-role='leverage']");
        const amount = amountInput ? Number(amountInput.value) : NaN;
        const leverage = leverageInput ? Number(leverageInput.value) : NaN;
        if (!Number.isFinite(amount) || !Number.isFinite(leverage) || amount <= 0 || leverage <= 0) {
          throw new Error(t("save_failed"));
        }
        await saveStrategyConfig(name, amount, leverage);
        showToast(t("save_ok"));
        await render();
      }
    } catch (err) {
      showToast(err.message || t("operation_failed"));
    }
  });

  refreshBtn.addEventListener("click", () => render(true));
  toggleAdvanced?.addEventListener("click", () => {
    setAdvancedVisible(!getAdvancedVisible());
  });
  strategyFilters?.addEventListener("click", (event) => {
    const button = event.target.closest("[data-filter]");
    if (!button) return;
    setStrategyFilter(button.getAttribute("data-filter"));
    render();
  });
  tabKline.addEventListener("click", () => setActiveTab("kline"));
  tabTrading.addEventListener("click", () => setActiveTab("trading"));
  klineSyncType.addEventListener("change", updateKlineForm);
  btStrategy.addEventListener("change", updateBacktestParamsPlaceholder);
  btRunBtn.addEventListener("click", async () => {
    await runBacktest();
  });
  quickStartBtn?.addEventListener("click", async () => {
    try {
      await quickStart();
    } catch (err) {
      showToast(err.message || t("quick_start_failed"));
    }
  });
  quickStopBtn?.addEventListener("click", async () => {
    try {
      await quickStop();
    } catch (err) {
      showToast(err.message || t("quick_start_failed"));
    }
  });
  klineSyncBtn.addEventListener("click", async () => {
    try {
      await syncKline();
    } catch (err) {
      showKlineResult(err.message || t("kline_sync_failed"));
      showToast(err.message || t("kline_sync_failed"));
    }
  });

  globalModeSelect.value = getGlobalMode();
  langSelect.value = getLang();
  langSelect.addEventListener("change", (event) => {
    setLang(event.target.value);
    applyI18n();
  });
  setActiveTab(getActiveTab());
  setDefaultDates();
  updateSyncTypeLabels();
  loadKlineOptions().finally(() => updateKlineForm());
  loadBacktestOptions();
  globalModeSelect.addEventListener("change", (event) => {
    const mode = setGlobalMode(event.target.value);
    applyGlobalModeToCards(mode);
    showToast(t("global_mode_set", {mode: mode === "paper" ? t("mode_label_paper") : t("mode_label_live")}));
  });

  applyI18n();
  setAdvancedVisible(getAdvancedVisible());
  setStrategyFilter(getStrategyFilter());
  setInterval(render, 6000);
</script>
</body>
</html>
