<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Bot Manager</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121931;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e6ebff;
      --muted: #a8b2d9;
      --primary: #5b8cff;
      --primary-hover: #4a7af3;
      --danger: #ff5c7a;
      --danger-hover: #ef4c69;
      --neutral: #25304d;
      --success-bg: rgba(29, 210, 136, 0.18);
      --success-text: #8ff5c5;
      --danger-bg: rgba(255, 92, 122, 0.2);
      --danger-text: #ffb4c2;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, #34498f 0%, transparent 38%),
        radial-gradient(circle at 92% 0%, #3e225d 0%, transparent 35%),
        linear-gradient(145deg, var(--bg) 0%, #0a0f1e 70%);
      min-height: 100vh;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.7vw, 1.8rem);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      backdrop-filter: blur(8px);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 9px 13px;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-refresh,
    .btn-logs {
      background: var(--neutral);
      color: var(--text);
    }

    .btn-start {
      background: var(--primary);
      color: #fff;
    }

    .btn-start:hover {
      background: var(--primary-hover);
    }

    .btn-stop {
      background: var(--danger);
      color: #fff;
    }

    .btn-stop:hover {
      background: var(--danger-hover);
    }

    .toast {
      margin-bottom: 14px;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(31, 126, 255, 0.18);
      color: #d7e7ff;
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      border-radius: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .status-running {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: rgba(143, 245, 197, 0.36);
    }

    .status-stopped {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: rgba(255, 180, 194, 0.35);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-box {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.18);
      padding: 8px;
      min-height: 56px;
    }

    .meta-k {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 3px;
    }

    .meta-v {
      color: var(--text);
      font-size: 0.84rem;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .log-view {
      margin-top: 2px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(2, 6, 22, 0.78);
      color: #c9d6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.74rem;
      line-height: 1.45;
      min-height: 132px;
      max-height: 280px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .skeleton {
      border-radius: 10px;
      background: linear-gradient(100deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.18) 36%, rgba(255, 255, 255, 0.06) 65%);
      background-size: 220% 100%;
      animation: shimmer 1.5s infinite linear;
      min-height: 180px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -30% 0; }
    }

    @media (max-width: 740px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        width: 100%;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="topbar">
    <div class="title-wrap">
      <h1>Crypto Bot Manager</h1>
      <div class="subtitle">Control bot runtime and inspect logs in one place</div>
    </div>
    <div class="toolbar">
      <div class="chip" id="last-sync">Last sync: --</div>
      <button class="btn btn-refresh" id="refresh">Refresh</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>
  <section class="grid" id="cards"></section>
</div>

<script>
  const cards = document.getElementById("cards");
  const toast = document.getElementById("toast");
  const refreshBtn = document.getElementById("refresh");
  const lastSync = document.getElementById("last-sync");

  function showToast(message) {
    toast.textContent = message;
    toast.style.display = "block";
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => {
      toast.style.display = "none";
    }, 2400);
  }

  function setLoading() {
    cards.innerHTML = "<div class='skeleton'></div><div class='skeleton'></div>";
  }

  async function fetchStrategies() {
    const response = await fetch("/api/strategies");
    if (!response.ok) throw new Error("Failed to load strategies");
    return response.json();
  }

  function cardTemplate(item) {
    const statusClass = item.running ? "status-running" : "status-stopped";
    const statusText = item.running ? "Running" : "Stopped";
    const startedAt = item.started_at ? new Date(item.started_at).toLocaleString() : "-";

    return `
      <article class="card" data-name="${item.name}">
        <div class="card-head">
          <h3 class="card-title">${item.display}</h3>
          <span class="status-pill ${statusClass}">${statusText}</span>
        </div>

        <div class="meta-grid">
          <div class="meta-box">
            <div class="meta-k">Script</div>
            <div class="meta-v">${item.script}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">PID</div>
            <div class="meta-v">${item.pid || "-"}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Started At</div>
            <div class="meta-v">${startedAt}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Log File</div>
            <div class="meta-v">${item.log}</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-start" data-action="start" ${item.running ? "disabled" : ""}>Start</button>
          <button class="btn btn-stop" data-action="stop" ${item.running ? "" : "disabled"}>Stop</button>
          <button class="btn btn-logs" data-action="logs">Load Logs</button>
        </div>

        <div class="log-view" id="log-${item.name}">Log preview is empty.</div>
      </article>`;
  }

  async function render(showLoader = false) {
    if (showLoader) setLoading();
    try {
      const list = await fetchStrategies();
      cards.innerHTML = list.map(cardTemplate).join("");
      lastSync.textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      showToast(err.message || "Load failed");
    }
  }

  async function control(name, action) {
    const response = await fetch(`/api/strategies/${name}/${action}`, {method: "POST"});
    const body = await response.json();
    showToast(body.message || `${action} completed`);
    await render();
  }

  async function loadLogs(name) {
    const response = await fetch(`/api/strategies/${name}/logs?lines=150`);
    const body = await response.json();
    const target = document.getElementById(`log-${name}`);
    target.textContent = body.content || "No logs yet.";
    target.scrollTop = target.scrollHeight;
  }

  cards.addEventListener("click", async (event) => {
    const button = event.target.closest("button[data-action]");
    if (!button) return;

    const card = event.target.closest(".card");
    if (!card) return;

    const name = card.dataset.name;
    const action = button.dataset.action;

    try {
      if (action === "start" || action === "stop") {
        await control(name, action);
      } else if (action === "logs") {
        await loadLogs(name);
      }
    } catch (err) {
      showToast(err.message || "Operation failed");
    }
  });

  refreshBtn.addEventListener("click", () => render(true));

  render(true);
  setInterval(render, 6000);
</script>
</body>
</html>
