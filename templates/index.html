<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Bot Manager</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}">
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121931;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e6ebff;
      --muted: #a8b2d9;
      --primary: #5b8cff;
      --primary-hover: #4a7af3;
      --danger: #ff5c7a;
      --danger-hover: #ef4c69;
      --neutral: #25304d;
      --success-bg: rgba(29, 210, 136, 0.18);
      --success-text: #8ff5c5;
      --danger-bg: rgba(255, 92, 122, 0.2);
      --danger-text: #ffb4c2;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, #34498f 0%, transparent 38%),
        radial-gradient(circle at 92% 0%, #3e225d 0%, transparent 35%),
        linear-gradient(145deg, var(--bg) 0%, #0a0f1e 70%);
      min-height: 100vh;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.7vw, 1.8rem);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .global-mode-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .chip {
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      backdrop-filter: blur(8px);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 9px 13px;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-refresh,
    .btn-logs {
      background: var(--neutral);
      color: var(--text);
    }

    .btn-start {
      background: var(--primary);
      color: #fff;
    }

    .btn-start:hover {
      background: var(--primary-hover);
    }

    .btn-stop {
      background: var(--danger);
      color: #fff;
    }

    .btn-stop:hover {
      background: var(--danger-hover);
    }

    .toast {
      margin-bottom: 14px;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(31, 126, 255, 0.18);
      color: #d7e7ff;
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      border-radius: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .status-running {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: rgba(143, 245, 197, 0.36);
    }

    .status-stopped {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: rgba(255, 180, 194, 0.35);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-box {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.18);
      padding: 8px;
      min-height: 56px;
    }

    .meta-k {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 3px;
    }

    .meta-v {
      color: var(--text);
      font-size: 0.84rem;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .mode-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .mode-select {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.82rem;
    }

    .log-view {
      margin-top: 2px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(2, 6, 22, 0.78);
      color: #c9d6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.74rem;
      line-height: 1.45;
      min-height: 132px;
      max-height: 280px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .skeleton {
      border-radius: 10px;
      background: linear-gradient(100deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.18) 36%, rgba(255, 255, 255, 0.06) 65%);
      background-size: 220% 100%;
      animation: shimmer 1.5s infinite linear;
      min-height: 180px;
    }

    .sync-panel {
      margin-bottom: 14px;
      border-radius: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .sync-title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 800;
    }

    .sync-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      margin-bottom: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .field input,
    .field select {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.82rem;
    }

    .sync-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .sync-result {
      margin: 0;
      color: #c9d6ff;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin-bottom: 14px;
      align-items: center;
    }

    .tab-btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.12s ease, border-color 0.2s ease;
      user-select: none;
    }

    .tab-btn:hover {
      transform: translateY(-1px);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .tab-btn[aria-selected="true"] {
      background: rgba(91, 140, 255, 0.22);
      border-color: rgba(91, 140, 255, 0.35);
      color: var(--text);
    }

    .tab-panel[hidden] {
      display: none !important;
    }

    .tab-panel {
      animation: tabIn 220ms ease both;
      transform-origin: top;
    }

    @keyframes tabIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -30% 0; }
    }

    @media (max-width: 740px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        width: 100%;
        flex-wrap: wrap;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="topbar">
    <div class="title-wrap">
      <h1>Crypto Bot Manager</h1>
      <div class="subtitle">Control bot runtime and inspect logs in one place</div>
    </div>
    <div class="toolbar">
      <div class="chip" id="last-sync">Last sync: --</div>
      <div class="global-mode-wrap">
        <span>Global start mode:</span>
        <select class="mode-select" id="global-mode">
          <option value="live">Live</option>
          <option value="paper">Simulated</option>
        </select>
      </div>
      <button class="btn btn-refresh" id="refresh">Refresh</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <nav class="tabs" role="tablist" aria-label="Sections">
    <button class="tab-btn" id="tab-kline" role="tab" aria-selected="true" aria-controls="panel-kline" type="button" data-tab="kline">同步 K 线数据</button>
    <button class="tab-btn" id="tab-trading" role="tab" aria-selected="false" aria-controls="panel-trading" type="button" data-tab="trading">启动交易脚本</button>
  </nav>

  <section class="tab-panel" id="panel-kline" role="tabpanel" aria-labelledby="tab-kline">
    <section class="sync-panel">
    <h2 class="sync-title">K-Line Sync</h2>
    <div class="sync-grid">
      <div class="field">
        <label for="kline-symbol">Symbol</label>
        <select id="kline-symbol">
          <option value="">Loading...</option>
        </select>
      </div>
      <div class="field">
        <label for="kline-sync-type">Sync Type</label>
        <select id="kline-sync-type">
          <option value="day" id="kline-sync-type-day">Single Day</option>
          <option value="range" id="kline-sync-type-range">Date Range</option>
        </select>
      </div>
      <div class="field">
        <label for="kline-timeframe">Timeframe</label>
        <select id="kline-timeframe"></select>
      </div>
      <div class="field" id="kline-day-wrap">
        <label for="kline-day">Date</label>
        <input id="kline-day" type="date">
      </div>
      <div class="field" id="kline-start-wrap" style="display:none;">
        <label for="kline-start">Start Date</label>
        <input id="kline-start" type="date">
      </div>
      <div class="field" id="kline-end-wrap" style="display:none;">
        <label for="kline-end">End Date</label>
        <input id="kline-end" type="date">
      </div>
      <div class="field">
        <label for="kline-tz">Timezone</label>
        <input id="kline-tz" type="text" value="Asia/Shanghai" placeholder="Asia/Shanghai">
      </div>
    </div>
    <div class="sync-actions">
      <button class="btn btn-start" id="kline-sync-btn">Sync K-Line</button>
      <p class="sync-result" id="kline-result">Ready.</p>
    </div>
    </section>

    <section class="sync-panel">
      <h2 class="sync-title">Backtest</h2>
      <div class="sync-grid">
        <div class="field">
          <label for="bt-symbol">Symbol</label>
          <select id="bt-symbol">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="field">
          <label for="bt-timeframe">Timeframe</label>
          <select id="bt-timeframe">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="field">
          <label for="bt-start">Start Date</label>
          <input id="bt-start" type="date">
        </div>
        <div class="field">
          <label for="bt-end">End Date</label>
          <input id="bt-end" type="date">
        </div>
        <div class="field">
          <label for="bt-tz">Timezone</label>
          <input id="bt-tz" type="text" value="Asia/Shanghai" placeholder="Asia/Shanghai">
        </div>
        <div class="field">
          <label for="bt-strategy">Strategy</label>
          <select id="bt-strategy">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="field">
          <label for="bt-leverage">Leverage</label>
          <input id="bt-leverage" type="number" min="0.1" step="0.1" value="1">
        </div>
        <div class="field">
          <label for="bt-fee-bps">Fee (bps/side)</label>
          <input id="bt-fee-bps" type="number" min="0" step="0.1" value="5">
        </div>
        <div class="field">
          <label for="bt-slippage-bps">Slippage (bps/side)</label>
          <input id="bt-slippage-bps" type="number" min="0" step="0.1" value="2">
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label for="bt-params">Strategy Params (JSON)</label>
          <input id="bt-params" type="text" placeholder='{"fast":10,"slow":30}'>
        </div>
      </div>
      <div class="sync-actions">
        <button class="btn btn-start" id="bt-run-btn">Run Backtest</button>
        <p class="sync-result" id="bt-result">Ready.</p>
      </div>
      <div class="log-view" id="bt-details" style="display:none;"></div>
    </section>
  </section>

  <section class="tab-panel" id="panel-trading" role="tabpanel" aria-labelledby="tab-trading" hidden>
    <section class="grid" id="cards"></section>
  </section>
</div>

<script>
  const tabKline = document.getElementById("tab-kline");
  const tabTrading = document.getElementById("tab-trading");
  const panelKline = document.getElementById("panel-kline");
  const panelTrading = document.getElementById("panel-trading");
  const cards = document.getElementById("cards");
  const toast = document.getElementById("toast");
  const refreshBtn = document.getElementById("refresh");
  const lastSync = document.getElementById("last-sync");
  const globalModeSelect = document.getElementById("global-mode");
  const klineSymbol = document.getElementById("kline-symbol");
  const klineSyncType = document.getElementById("kline-sync-type");
  const klineSyncTypeDay = document.getElementById("kline-sync-type-day");
  const klineSyncTypeRange = document.getElementById("kline-sync-type-range");
  const klineTimeframe = document.getElementById("kline-timeframe");
  const klineDay = document.getElementById("kline-day");
  const klineStart = document.getElementById("kline-start");
  const klineEnd = document.getElementById("kline-end");
  const klineTz = document.getElementById("kline-tz");
  const klineDayWrap = document.getElementById("kline-day-wrap");
  const klineStartWrap = document.getElementById("kline-start-wrap");
  const klineEndWrap = document.getElementById("kline-end-wrap");
  const klineSyncBtn = document.getElementById("kline-sync-btn");
  const klineResult = document.getElementById("kline-result");
  const btSymbol = document.getElementById("bt-symbol");
  const btTimeframe = document.getElementById("bt-timeframe");
  const btStart = document.getElementById("bt-start");
  const btEnd = document.getElementById("bt-end");
  const btTz = document.getElementById("bt-tz");
  const btStrategy = document.getElementById("bt-strategy");
  const btLeverage = document.getElementById("bt-leverage");
  const btFeeBps = document.getElementById("bt-fee-bps");
  const btSlippageBps = document.getElementById("bt-slippage-bps");
  const btParams = document.getElementById("bt-params");
  const btRunBtn = document.getElementById("bt-run-btn");
  const btResult = document.getElementById("bt-result");
  const btDetails = document.getElementById("bt-details");
  const GLOBAL_MODE_KEY = "ds-global-start-mode";
  const ACTIVE_TAB_KEY = "ds-active-tab";

  const defaultKlineConfig = {
    symbols: ["BTC/USDT:USDT", "ETH/USDT:USDT", "DOGE/USDT:USDT", "XRP/USDT:USDT"],
    day_timeframes: ["5m", "15m", "1H"],
    range_timeframes: ["5m", "15m", "1H", "1D", "1M"],
    default_tz: "Asia/Shanghai",
  };

  let klineTimeframeOptions = {
    day: ["5m", "15m", "1H"],
    range: ["5m", "15m", "1H", "1D", "1M"],
  };

  function normalizeMode(value) {
    return value === "paper" ? "paper" : "live";
  }

  function getGlobalMode() {
    try {
      return normalizeMode(localStorage.getItem(GLOBAL_MODE_KEY));
    } catch (err) {
      return "live";
    }
  }

  function setGlobalMode(mode) {
    const normalized = normalizeMode(mode);
    try {
      localStorage.setItem(GLOBAL_MODE_KEY, normalized);
    } catch (err) {
      // ignore storage errors
    }
    return normalized;
  }

  function applyGlobalModeToCards(mode) {
    const normalized = normalizeMode(mode);
    cards.querySelectorAll(".card").forEach((card) => {
      const startBtn = card.querySelector("[data-action='start']");
      const modeSelect = card.querySelector("[data-role='mode']");
      if (!startBtn || !modeSelect || startBtn.disabled) return;
      modeSelect.value = normalized;
    });
  }

  function normalizeTab(value) {
    return value === "trading" ? "trading" : "kline";
  }

  function setActiveTab(tab) {
    const normalized = normalizeTab(tab);
    const isKline = normalized === "kline";

    tabKline.setAttribute("aria-selected", isKline ? "true" : "false");
    tabTrading.setAttribute("aria-selected", isKline ? "false" : "true");
    panelKline.hidden = !isKline;
    panelTrading.hidden = isKline;

    try {
      localStorage.setItem(ACTIVE_TAB_KEY, normalized);
    } catch (err) {
      // ignore storage errors
    }
  }

  function getActiveTab() {
    try {
      return normalizeTab(localStorage.getItem(ACTIVE_TAB_KEY));
    } catch (err) {
      return "kline";
    }
  }

  function showToast(message) {
    toast.textContent = message;
    toast.style.display = "block";
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => {
      toast.style.display = "none";
    }, 2400);
  }

  function setLoading() {
    cards.innerHTML = "<div class='skeleton'></div><div class='skeleton'></div>";
  }

  function setDefaultDates() {
    const today = new Date();
    const formatDate = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };
    const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);
    if (!klineDay.value) klineDay.value = formatDate(yesterday);
    if (!klineStart.value) klineStart.value = formatDate(yesterday);
    if (!klineEnd.value) klineEnd.value = formatDate(today);
  }

  function fillSelectOptions(selectElement, options, keepCurrent = true) {
    const values = Array.isArray(options) ? options.filter(Boolean) : [];
    const current = keepCurrent ? selectElement.value : "";

    if (!values.length) {
      selectElement.innerHTML = "<option value=''>--</option>";
      return;
    }

    selectElement.innerHTML = values
      .map((value) => `<option value="${value}">${value}</option>`)
      .join("");

    if (keepCurrent && values.includes(current)) {
      selectElement.value = current;
    }
  }

  function syncTypeLabel(prefix, timeframes) {
    const items = Array.isArray(timeframes) ? timeframes.filter(Boolean) : [];
    if (!items.length) return prefix;
    return `${prefix} (${items.join(" / ")})`;
  }

  function updateSyncTypeLabels() {
    klineSyncTypeDay.textContent = syncTypeLabel("Single Day", klineTimeframeOptions.day);
    klineSyncTypeRange.textContent = syncTypeLabel("Date Range", klineTimeframeOptions.range);
  }

  async function loadKlineOptions() {
    try {
      const response = await fetch("/api/kline/options");
      if (!response.ok) throw new Error("Failed to load K-line options");
      const body = await response.json();

      fillSelectOptions(klineSymbol, body.symbols || defaultKlineConfig.symbols, true);
      klineTimeframeOptions = {
        day: body.day_timeframes || defaultKlineConfig.day_timeframes,
        range: body.range_timeframes || defaultKlineConfig.range_timeframes,
      };
      if (!klineTz.value.trim()) {
        klineTz.value = body.default_tz || defaultKlineConfig.default_tz;
      }
      updateSyncTypeLabels();
      return;
    } catch (err) {
      fillSelectOptions(klineSymbol, defaultKlineConfig.symbols, true);
      klineTimeframeOptions = {
        day: defaultKlineConfig.day_timeframes,
        range: defaultKlineConfig.range_timeframes,
      };
      updateSyncTypeLabels();
      showToast(err.message || "Load K-line options failed");
    }
  }

  function updateKlineForm() {
    const type = klineSyncType.value === "range" ? "range" : "day";
    const options = klineTimeframeOptions[type] || [];
    const current = klineTimeframe.value;

    klineTimeframe.innerHTML = options
      .map((value) => `<option value="${value}">${value}</option>`)
      .join("");

    if (options.includes(current)) {
      klineTimeframe.value = current;
    } else if (options.length) {
      klineTimeframe.value = options[0];
    }

    const isRange = type === "range";
    klineDayWrap.style.display = isRange ? "none" : "flex";
    klineStartWrap.style.display = isRange ? "flex" : "none";
    klineEndWrap.style.display = isRange ? "flex" : "none";
  }

  function showKlineResult(text) {
    klineResult.textContent = text;
  }

  function showBacktestResult(text, details = "") {
    btResult.textContent = text;
    const detailText = (details || "").trim();
    if (detailText) {
      btDetails.style.display = "block";
      btDetails.textContent = detailText;
    } else {
      btDetails.style.display = "none";
      btDetails.textContent = "";
    }
  }

  function safeParseJsonOrEmpty(text) {
    const trimmed = String(text || "").trim();
    if (!trimmed) return {};
    try {
      const parsed = JSON.parse(trimmed);
      return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
    } catch (err) {
      return null;
    }
  }

  let backtestStrategyMeta = {};

  function applyBacktestDefaults(body) {
    const defaults = (body && body.defaults) || {};
    if (btTz && !btTz.value.trim()) btTz.value = body.default_tz || "Asia/Shanghai";
    if (btLeverage && !btLeverage.value) btLeverage.value = String(defaults.leverage ?? 1.0);
    if (btFeeBps && !btFeeBps.value) btFeeBps.value = String(defaults.fee_bps ?? 5.0);
    if (btSlippageBps && !btSlippageBps.value) btSlippageBps.value = String(defaults.slippage_bps ?? 2.0);
  }

  function updateBacktestParamsPlaceholder() {
    const sid = btStrategy.value;
    const meta = backtestStrategyMeta[sid] || {};
    const defaults = meta.defaults || {};
    btParams.placeholder = JSON.stringify(defaults);
    if (!btParams.value.trim()) {
      btParams.value = JSON.stringify(defaults);
    }
  }

  async function loadBacktestOptions() {
    try {
      const response = await fetch("/api/backtest/options");
      if (!response.ok) throw new Error("Failed to load backtest options");
      const body = await response.json();

      fillSelectOptions(btSymbol, body.symbols || defaultKlineConfig.symbols, true);
      fillSelectOptions(btTimeframe, body.timeframes || ["15m"], true);

      const strategies = Array.isArray(body.strategies) ? body.strategies : [];
      backtestStrategyMeta = {};
      btStrategy.innerHTML = strategies
        .map((s) => {
          const id = String(s.id || "");
          backtestStrategyMeta[id] = s;
          const name = String(s.name || id);
          return `<option value="${id}">${name}</option>`;
        })
        .join("");

      applyBacktestDefaults(body);
      updateBacktestParamsPlaceholder();

      // Default date range: yesterday -> today
      const today = new Date();
      const formatDate = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      };
      const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);
      if (!btStart.value) btStart.value = formatDate(yesterday);
      if (!btEnd.value) btEnd.value = formatDate(today);
      return;
    } catch (err) {
      showToast(err.message || "Load backtest options failed");
    }
  }

  async function runBacktest() {
    const params = safeParseJsonOrEmpty(btParams.value);
    if (params === null) {
      showBacktestResult("Params JSON invalid.");
      return;
    }

    const payload = {
      symbol: btSymbol.value,
      timeframe: btTimeframe.value,
      start_date: btStart.value,
      end_date: btEnd.value,
      tz: btTz.value.trim() || "Asia/Shanghai",
      strategy_id: btStrategy.value,
      params,
      leverage: Number(btLeverage.value || 1),
      fee_bps: Number(btFeeBps.value || 0),
      slippage_bps: Number(btSlippageBps.value || 0),
    };

    if (!payload.start_date || !payload.end_date) {
      showBacktestResult("请选择开始和结束日期");
      return;
    }

    btRunBtn.disabled = true;
    showBacktestResult("Running...");
    try {
      const response = await fetch("/api/backtest/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      const body = await response.json();
      if (!response.ok) throw new Error(body.error || "Backtest failed");

      const r = body.result || {};
      const headline =
        `Done | candles=${r.candles} trades=${r.trades} total=${(r.total_return_pct ?? 0).toFixed(2)}% ` +
        `dd=${(r.max_drawdown_pct ?? 0).toFixed(2)}% win=${(r.win_rate_pct ?? 0).toFixed(1)}% ` +
        `bh=${(r.buy_hold_return_pct ?? 0).toFixed(2)}%`;

      const lines = [];
      const strategyObj = r.strategy || {};
      lines.push(`strategy=${strategyObj.id || ""} leverage=${r.leverage} fee_bps=${r.fee_bps} slippage_bps=${r.slippage_bps}`);
      lines.push(`symbol=${r.symbol} timeframe=${r.timeframe} tz=${r.tz}`);
      lines.push(`range=${r.start_date}..${r.end_date}`);
      if (r.profit_factor != null) lines.push(`profit_factor=${Number(r.profit_factor).toFixed(3)}`);
      if (r.sharpe_like != null) lines.push(`sharpe_like=${Number(r.sharpe_like).toFixed(3)}`);
      lines.push("");
      const preview = Array.isArray(r.trades_preview) ? r.trades_preview : [];
      if (preview.length) {
        lines.push("trades_preview:");
        preview.forEach((t) => {
          lines.push(
            `${t.side} entry=${t.entry_price} exit=${t.exit_price} ret=${(t.return_pct ?? 0).toFixed(2)}%`
          );
        });
      } else {
        lines.push("trades_preview: (empty)");
      }

      showBacktestResult(headline, lines.join("\n"));
      showToast("Backtest finished");
    } catch (err) {
      showBacktestResult(err.message || "Backtest failed");
      showToast(err.message || "Backtest failed");
    } finally {
      btRunBtn.disabled = false;
    }
  }

  async function syncKline() {
    const syncType = klineSyncType.value === "range" ? "range" : "day";
    const payload = {
      symbol: klineSymbol.value,
      sync_type: syncType,
      timeframe: klineTimeframe.value,
      tz: klineTz.value.trim() || "Asia/Shanghai",
    };

    if (syncType === "day") {
      if (!klineDay.value) throw new Error("请选择单日日期");
      payload.date = klineDay.value;
    } else {
      if (!klineStart.value || !klineEnd.value) throw new Error("请选择开始和结束日期");
      payload.start_date = klineStart.value;
      payload.end_date = klineEnd.value;
    }

    klineSyncBtn.disabled = true;
    showKlineResult("Syncing...");

    try {
      const response = await fetch("/api/kline/sync", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });

      const body = await response.json();
      if (!response.ok) {
        throw new Error(body.error || "K-line sync failed");
      }

      const result = body.result || {};
      showKlineResult(
        `Done | symbol=${result.symbol} timeframe=${result.timeframe} fetched=${result.fetched} affected=${result.affected}`
      );
      showToast("K-line sync finished");
    } finally {
      klineSyncBtn.disabled = false;
    }
  }

  async function fetchStrategies() {
    const response = await fetch("/api/strategies");
    if (!response.ok) throw new Error("Failed to load strategies");
    return response.json();
  }

  function cardTemplate(item) {
    const statusClass = item.running ? "status-running" : "status-stopped";
    const statusText = item.running ? "Running" : "Stopped";
    const mode = item.mode === "paper" ? "paper" : "live";
    const modeLabel = mode === "paper" ? "Simulated" : "Live";
    const startMode = item.running ? mode : getGlobalMode();
    const startedAt = item.started_at ? new Date(item.started_at).toLocaleString() : "-";

    return `
      <article class="card" data-name="${item.name}">
        <div class="card-head">
          <h3 class="card-title">${item.display}</h3>
          <span class="status-pill ${statusClass}">${statusText}</span>
        </div>

        <div class="meta-grid">
          <div class="meta-box">
            <div class="meta-k">Script</div>
            <div class="meta-v">${item.script}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">PID</div>
            <div class="meta-v">${item.pid || "-"}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Started At</div>
            <div class="meta-v">${startedAt}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Log File</div>
            <div class="meta-v">${item.log}</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Trade Mode</div>
            <div class="meta-v">${modeLabel}</div>
          </div>
        </div>

        <div class="mode-row">
          <span>Start mode:</span>
          <select class="mode-select" data-role="mode" ${item.running ? "disabled" : ""}>
            <option value="live" ${startMode === "live" ? "selected" : ""}>Live (Real Trading)</option>
            <option value="paper" ${startMode === "paper" ? "selected" : ""}>Simulated (Paper)</option>
          </select>
        </div>

        <div class="actions">
          <button class="btn btn-start" data-action="start" ${item.running ? "disabled" : ""}>Start</button>
          <button class="btn btn-stop" data-action="stop" ${item.running ? "" : "disabled"}>Stop</button>
          <button class="btn btn-logs" data-action="logs">Load Logs</button>
        </div>

        <div class="log-view" id="log-${item.name}">Log preview is empty.</div>
      </article>`;
  }

  async function render(showLoader = false) {
    if (showLoader) setLoading();
    try {
      const list = await fetchStrategies();
      cards.innerHTML = list.map(cardTemplate).join("");
      lastSync.textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      showToast(err.message || "Load failed");
    }
  }

  async function control(name, action, mode = "live") {
    const fetchOptions = {method: "POST"};
    if (action === "start") {
      fetchOptions.headers = {"Content-Type": "application/json"};
      fetchOptions.body = JSON.stringify({mode});
    }
    const response = await fetch(`/api/strategies/${name}/${action}`, fetchOptions);
    const body = await response.json();
    showToast(body.message || `${action} completed`);
    await render();
  }

  async function loadLogs(name) {
    const response = await fetch(`/api/strategies/${name}/logs?lines=150`);
    const body = await response.json();
    const target = document.getElementById(`log-${name}`);
    target.textContent = body.content || "No logs yet.";
    target.scrollTop = target.scrollHeight;
  }

  cards.addEventListener("click", async (event) => {
    const button = event.target.closest("button[data-action]");
    if (!button) return;

    const card = event.target.closest(".card");
    if (!card) return;

    const name = card.dataset.name;
    const action = button.dataset.action;
    const modeSelect = card.querySelector("[data-role='mode']");
    const selectedMode = modeSelect ? modeSelect.value : "live";

    try {
      if (action === "start" || action === "stop") {
        await control(name, action, selectedMode);
      } else if (action === "logs") {
        await loadLogs(name);
      }
    } catch (err) {
      showToast(err.message || "Operation failed");
    }
  });

  refreshBtn.addEventListener("click", () => render(true));
  tabKline.addEventListener("click", () => setActiveTab("kline"));
  tabTrading.addEventListener("click", () => setActiveTab("trading"));
  klineSyncType.addEventListener("change", updateKlineForm);
  btStrategy.addEventListener("change", updateBacktestParamsPlaceholder);
  btRunBtn.addEventListener("click", async () => {
    await runBacktest();
  });
  klineSyncBtn.addEventListener("click", async () => {
    try {
      await syncKline();
    } catch (err) {
      showKlineResult(err.message || "K-line sync failed");
      showToast(err.message || "K-line sync failed");
    }
  });

  globalModeSelect.value = getGlobalMode();
  setActiveTab(getActiveTab());
  setDefaultDates();
  updateSyncTypeLabels();
  loadKlineOptions().finally(() => updateKlineForm());
  loadBacktestOptions();
  globalModeSelect.addEventListener("change", (event) => {
    const mode = setGlobalMode(event.target.value);
    applyGlobalModeToCards(mode);
    showToast(`Global start mode set to ${mode === "paper" ? "Simulated" : "Live"}`);
  });

  render(true);
  setInterval(render, 6000);
</script>
</body>
</html>
